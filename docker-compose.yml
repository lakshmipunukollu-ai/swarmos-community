version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: swarmos
      POSTGRES_USER: swarmos
      POSTGRES_PASSWORD: swarmos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://swarmos:swarmos123@postgres:5432/swarmos
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://redis:6379
      SWARM_PROJECTS_DIR: /gauntlet-projects
    depends_on:
      - postgres
      - redis
    volumes:
      - ${SWARM_PROJECTS_DIR:-~/gauntlet-swarm/projects}:/gauntlet-projects:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
